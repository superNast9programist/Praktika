<!doctype html>
<html>
    <head>
        <title>News App</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div class="container">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
    <button id="backBtn" style="background: #b5838d; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer;">←</button>
    <button id="forwardBtn" style="background: #b5838d; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer;">→</button>
</div>
            <h1>News Search</h1>

            <input id="searchInput" placeholder="Search news..." />
            <button id="searchBtn">Search</button>

            <h2>Results</h2>
            <div id="newsContainer"></div>

            <h2>
                Saved
                <button id="deleteAllBtn" class="delete-all-btn">Delete All</button>
            </h2>
            <div id="savedContainer"></div>
        </div>

        <script src="js/app.js"></script>
    </body>
</html>
